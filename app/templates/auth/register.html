{% extends "base.html" %}

{% block title %}Register — VisionBoard AI{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-100 py-5">
  <div class="col-md-6 col-lg-5">
    <div class="glass-card p-4 p-md-5 text-center shadow-lg">
      <div class="mb-4">
        <i class="bi bi-person-plus-fill display-3 text-gradient"></i>
        <h2 class="mt-2 text-white font-heading">Create Account</h2>
        <p class="text-muted small">Unlock full AI visual search and image intelligence</p>
      </div>

      <form action="{{ url_for('auth.register') }}" method="POST">
        <div class="mb-3 text-start">
          <label class="form-label text-muted small fw-semibold">Username</label>
          <input type="text" name="username" class="form-control glass-input" placeholder="Choose a username" required>
        </div>

        <div class="mb-3 text-start">
          <label class="form-label text-muted small fw-semibold">Email Address</label>
          <input type="email" name="email" class="form-control glass-input" placeholder="name@example.com" required>
        </div>

        <div class="row mb-4">
          <div class="col-md-6 text-start mb-3 mb-md-0">
            <label class="form-label text-muted small fw-semibold">Password</label>
            <input type="password" name="password" class="form-control glass-input" placeholder="••••••••" required>
          </div>
          <div class="col-md-6 text-start">
            <label class="form-label text-muted small fw-semibold">Confirm Password</label>
            <input type="password" name="confirm_password" class="form-control glass-input" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn btn-gradient w-100 py-3 mb-3">
          Create Account <i class="bi bi-check-circle ms-2"></i>
        </button>

        <p class="text-muted small mb-0">
          Already have an account? <a href="{{ url_for('auth.login') }}" class="text-cyan text-decoration-none fw-semibold">Login here</a>
        </p>
      </form>
    </div>
  </div>
</div>
{% endblock %}
