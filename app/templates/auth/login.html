{% extends "base.html" %}

{% block title %}Login — VisionBoard AI{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-100 py-5">
  <div class="col-md-5 col-lg-4">
    <div class="glass-card p-4 p-md-5 text-center shadow-lg">
      <div class="mb-4">
        <i class="bi bi-eye-fill display-3 text-gradient"></i>
        <h2 class="mt-2 text-white font-heading">Welcome Back</h2>
        <p class="text-muted small">Access your personal VisionBoard AI library</p>
      </div>

      <form action="{{ url_for('auth.login') }}" method="POST">
        <div class="mb-3 text-start">
          <label class="form-label text-muted small fw-semibold">Email or Username</label>
          <div class="input-group">
            <span class="input-group-text glass-input border-end-0 text-muted"><i class="bi bi-person"></i></span>
            <input type="text" name="email_or_user" class="form-control glass-input border-start-0" placeholder="Enter username or email" required>
          </div>
        </div>

        <div class="mb-4 text-start">
          <label class="form-label text-muted small fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text glass-input border-end-0 text-muted"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control glass-input border-start-0" placeholder="••••••••" required>
          </div>
        </div>

        <button type="submit" class="btn btn-gradient w-100 py-3 mb-3">
          Sign In <i class="bi bi-arrow-right ms-2"></i>
        </button>

        <p class="text-muted small mb-0">
          Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-cyan text-decoration-none fw-semibold">Register here</a>
        </p>
      </form>
    </div>
  </div>
</div>
{% endblock %}
